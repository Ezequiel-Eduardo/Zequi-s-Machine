<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zequi's Machine</title>
    <link rel="stylesheet" href="Assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="input">
        <h1>001</h1>
      </div>
      <div class="results">
        <div class="result">
          <span>HEX</span> 
          <div class="hex">10</div>
        </div>
        <div class="result">
          <span>DEC</span>
          <div class="dec">10</div>
        </div>
        <div class="result">
          <span>OCT</span>
          <div class="oct">10</div>
        </div>
        <div class="result">
          <span>BIN</span>
          <div class="bin">10</div>
        </div>
      </div>
      <hr>
      <div class="operations">
        <div class="operator"><span>A</span></div>
        <div class="operator"><span>x</span></div>
        <div class="operator"><span>+</span></div>
        <div class="operator"><span>-</span></div>
        <div class="operator"><span>B</span></div>
        <div class="operator"><span>÷</span></div>
        <div class="operator"><span>%</span></div>
        <div class="operator"><span>9</span></div>
        <div class="operator"><span>C</span></div>
        <div class="operator"><span>8</span></div>
        <div class="operator"><span>7</span></div>
        <div class="operator"><span>6</span></div>
        <div class="operator"><span>D</span></div>
        <div class="operator"><span>5</span></div>
        <div class="operator"><span>4</span></div>
        <div class="operator"><span>3</span></div> 
        <div class="operator"><span>E</span></div>
        <div class="operator"><span>2</span></div>
        <div class="operator"><span>1</span></div>
        <div class="operator"><span>0</span></div>
        <div class="operator"><span>E</span></div>
        <div class="operator"><span>CE</span></div>
        <div class="operator equal"><span>=</span></div>
      </div>
    </div>
  </body>
</html>
<script src="Assets/js/script.js"></script>
