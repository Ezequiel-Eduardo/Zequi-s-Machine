<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zequi's Machine</title>
    <link rel="stylesheet" href="Assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="input">
        <h1 id="input_number">0</h1>
      </div>
      <div class="results">
        <div class="result">
          <span>HEX</span>
          <div class="hex"></div>
        </div>
        <div class="result active">
          <span>DEC</span>
          <div class="dec"></div>
        </div>
        <div class="result">
          <span>OCT</span>
          <div class="oct"></div>
        </div>
        <div class="result">
          <span>BIN</span>
          <div class="bin"></div>
        </div>
      </div>
      <hr />
      <div class="operations">
        <div class="operator" onclick="digitar('A')"><span>A</span></div>
        <div class="operator" onclick="multiplicar()"><span>x</span></div>
        <div class="operator" onclick="somar()"><span>+</span></div>
        <div class="operator" onclick="subtrair()"><span>-</span></div>
        <div class="operator" onclick="digitar('B')"><span>B</span></div>
        <div class="operator" onclick="dividir()"><span>÷</span></div>
        <div class="operator" onclick="digitar('%')"><span>%</span></div>
        <div class="operator" onclick="digitar(9)"><span>9</span></div>
        <div class="operator" onclick="digitar('C')"><span>C</span></div>
        <div class="operator" onclick="digitar(8)"><span>8</span></div>
        <div class="operator" onclick="digitar(7)"><span>7</span></div>
        <div class="operator" onclick="digitar(6)"><span>6</span></div>
        <div class="operator" onclick="digitar('D')"><span>D</span></div>
        <div class="operator" onclick="digitar(5)"><span>5</span></div>
        <div class="operator" onclick="digitar(4)"><span>4</span></div>
        <div class="operator" onclick="digitar(3)"><span>3</span></div>
        <div class="operator" onclick="digitar('E')"><span>E</span></div>
        <div class="operator" onclick="digitar(2)"><span>2</span></div>
        <div class="operator" onclick="digitar(1)"><span>1</span></div>
        <div class="operator" onclick="digitar(0)"><span>0</span></div>
        <div class="operator" onclick="digitar('F')"><span>F</span></div>
        <div class="operator" onclick="apagar()"><span>CE</span></div>
        <div class="operator equal" onclick="calcular()"><span>=</span></div>
      </div>
    </div>
  </body>
</html>
<script src="Assets/js/script.js"></script>
